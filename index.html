<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Study Tool</title>
</head>
<body>

    <h1>Math Study Tool</h1>

    <p>Designed to help you practice and improve your math skills.</p>

    <div class="info-container">

        <div class="grade-level-container">

            <p>What is your grade level?</p>
            <select class="grade-level">
                <option value="1">1st Grade</option>
                <option value="2">2nd Grade</option>
                <option value="3">3rd Grade</option>
                <option value="4">4th Grade</option>
                <option value="5">5th Grade</option>
                <option value="6">6th Grade</option>
                <option value="7">7th Grade</option>
                <option value="8">8th Grade</option>
                <option value="9">9th Grade</option>
                <option value="10">10th Grade</option>
                <option value="11">11th Grade</option>
                <option value="12">12th Grade</option>
            </select>

        </div>

        <div class="topic-container">

            <p>What topic would you like to study?</p>
            <input type="text" class="topic"> 

        </div>

        <div class="difficulty-container">

            <p>What difficulty level would you like?</p>
            <select class="difficulty-level">

                <option value="1">Easy</option>
                <option value="2">Medium</option>
                <option value="3">Hard</option>

            </select>

        </div>

        <div class="example-container">

            <p>Any examples of the topic you want to study? (Optional)</p>
            <input type="text" class="example">

        </div>

        <button class="generate-btn">
            Generate
        </button>
        
    </div>

    <div class="generated-question-container">

        <div class="generated-question">

            <p>*Question will appear here*</p>

            <button class="hint-btn">Hint</button>

            <button class="show-answer-btn">Show Answer</button>

            <button class="randomize-btn">Randomize</button>

        </div>

    </div>
    
</body>
</html>
