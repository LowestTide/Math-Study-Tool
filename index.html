<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Study Tool</title>
</head>
<body>

    <h1>Math Study Tool</h1>

    <p>Designed to help you practice and improve your math skills.</p>

    <div class="info-container">

        <div class="grade-level-container">

            <p>What is your grade level?</p>
            <select class="grade-level">
                <option value=""></option>
                <option value="9">9th Grade</option>
                <option value="10">10th Grade</option>
                <option value="11">11th Grade</option>
                <option value="12">12th Grade</option>
            </select>
            <!--
                algebra, functions, basic calculus, statistics,
                geometry, trigonometry, factoring, probability,
                comibnatorics, sequences, series, limits, exponents, problem-solving  etc. 
            -->

        </div>

        <div class="topic-container">

            <label for="topics">What topic would you like to study?</label>
            <br>
            <select required class="topic-selector js-topic-selector"id="topics" style="width: 150px;">
                <!-- <option value=""></option>
                <option value="algebra">Algebra</option>
                <option value="functions">Functions</option>
                <option value="geometry">Geometry</option>
                <option value="factoring">Factoring</option>
                <option value="trigonometry">Trigonometry</option>
                <option value="probability">Probability</option>
                <option value="statistics">Statistics</option>
                <option value="sequences">Sequences</option>
                <option value="series">Series</option>
                <option value="limits">Limits</option> -->
            </select>

        </div>

        <div class="difficulty-container">

            <p>What difficulty level would you like?</p>
            <select required class="difficulty-level">
s
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>

            </select>

        </div>

        <div class="example-container">

            <p>Any examples of the topic you want to study? (Optional)</p>
            <input type="text" class="example">

        </div>

        <button class="generate-btn">
            Generate
        </button>
        
    </div>

    <div class="generated-question-container">

        <div class="generated-question">

            <p class="display-question">*Question will appear here*</p>

            <button class="hint-btn">Hint</button>

            <button class="show-answer-btn">Show Answer</button>

            <button class="randomize-btn">Randomize</button>

        </div>

    </div>
    <script type="module" src="scripts/data.js"></script>
    <script type="module" src="scripts/generate.js"></script>
    <script type="module" src="scripts/index.js"></script> 
    
    
</body>
</html>
